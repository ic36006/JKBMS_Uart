<script>
  let historyChart;
  let activeTimeRange = '1hr';
  let activeMetric = 'voltage';
  let currentSettings = { batteryName: 'BATTERY', cellCount: 16, capacityAh: 280, retentionDays: 30 };

  const METRIC_LABELS = {
    voltage: 'Voltage (V)', current: 'Current (A)', power: 'Power (W)', soc: 'SOC (%)',
    mosTemp: 'MOS Temp (°C)', temp1: 'BAT1 Temp (°C)', temp2: 'BAT2 Temp (°C)', remainAh: 'Remaining (Ah)'
  };

  // ---------- Settings Modal ----------
  function openSettings() {
    document.getElementById('set-name').value = currentSettings.batteryName;
    document.getElementById('set-cellcount').value = currentSettings.cellCount;
    document.getElementById('set-capacity').value = currentSettings.capacityAh;
    document.getElementById('set-retention').value = currentSettings.retentionDays;
    document.getElementById('settings-modal').classList.add('open');
  }

  function closeSettings() {
    document.getElementById('settings-modal').classList.remove('open');
  }

  function saveSettingsForm() {
    let newSettings = {
      batteryName: document.getElementById('set-name').value || 'BATTERY',
      cellCount: parseInt(document.getElementById('set-cellcount').value),
      capacityAh: parseFloat(document.getElementById('set-capacity').value) || 280,
      retentionDays: parseInt(document.getElementById('set-retention').value)
    };
    google.script.run.withSuccessHandler(function(saved) {
      currentSettings = saved;
      applySettingsToUI();
      closeSettings();
      fetchDashboardData();
    }).saveSettings(newSettings);
  }

  function applySettingsToUI() {
    document.getElementById('battery-name').innerText = currentSettings.batteryName;
    document.getElementById('cap-total').innerText = currentSettings.capacityAh + ' Ah';
    buildCellRows(currentSettings.cellCount);
  }

  function buildCellRows(count) {
    let container = document.getElementById('cell-container');
    container.innerHTML = '';
    for (let i = 1; i <= count; i++) {
      let row = document.createElement('div');
      row.className = 'cell-row';
      row.innerHTML = `<span>C${i}</span>
        <div class="progress-bg"><div id="c${i}-bar" class="progress-fill"></div></div>
        <span id="c${i}-txt" class="green-txt">0.000 V</span>`;
      container.appendChild(row);
    }
  }

  // ---------- Chart controls ----------
  function changeTimeRange(range, btnElement) {
    activeTimeRange = range;
    document.querySelectorAll('.btn-time').forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');
    fetchDashboardData();
  }

  function changeMetric(metric) {
    activeMetric = metric;
    fetchDashboardData();
  }

  // ---------- Gauge ----------
  function updateGauge(percent) {
    const circle = document.getElementById('soc-gauge');
    if (!circle) return;
    const maxDash = 400;
    const offset = maxDash - (percent / 100) * maxDash;
    circle.style.strokeDashoffset = offset;
    document.getElementById('soc-val').innerText = percent;
  }

  // ---------- Main fetch ----------
  function fetchDashboardData() {
    google.script.run.withSuccessHandler(function(data) {
      if (!data || !data.latest) return;
      let latest = data.latest;

      if (latest.timestamp) {
        let d = new Date(latest.timestamp);
        document.getElementById('last-update').innerText = isNaN(d.getTime()) ? "Just now" : d.toLocaleTimeString('th-TH', { hour12: false });
      }

      if (latest.soc !== undefined) updateGauge(Math.round(latest.soc));
      if (latest.voltage !== undefined) document.getElementById('v-val').innerText = Number(latest.voltage).toFixed(2);

      if (latest.current !== undefined) {
        let amp = Number(latest.current);
        document.getElementById('a-val').innerText = amp > 0 ? "+" + amp.toFixed(2) : amp.toFixed(2);
      }

      if (latest.power !== undefined) document.getElementById('w-val').innerText = Number(latest.power).toFixed(1);
      if (latest.diffV !== undefined) document.getElementById('diff-cell').innerText = Number(latest.diffV).toFixed(3) + " V";
      if (latest.minV !== undefined) document.getElementById('min-cell').innerText = Number(latest.minV).toFixed(3) + " V";
      if (latest.maxV !== undefined) document.getElementById('max-cell').innerText = Number(latest.maxV).toFixed(3) + " V";
      if (latest.remainAh !== undefined) document.getElementById('rem-ah').innerText = Math.round(Number(latest.remainAh)) + " Ah";
      if (latest.tempMos !== undefined) document.getElementById('t-mos').innerText = Number(latest.tempMos).toFixed(1) + " °C";
      if (latest.temp1 !== undefined) document.getElementById('t-bat1').innerText = Number(latest.temp1).toFixed(1) + " °C";
      if (latest.temp2 !== undefined) document.getElementById('t-bat2').innerText = Number(latest.temp2).toFixed(1) + " °C";
      if (latest.capacityAh !== undefined) document.getElementById('cap-total').innerText = latest.capacityAh + " Ah";
      if (latest.remainAh !== undefined && latest.capacityAh) {
        let capPct = (Number(latest.remainAh) / Number(latest.capacityAh)) * 100;
        document.getElementById('cap-bar').style.width = Math.min(100, Math.max(0, capPct)) + '%';
      }
      if (latest.batteryName) document.getElementById('battery-name').innerText = latest.batteryName;

      if (latest.cellVoltages) {
        let cells = latest.cellVoltages.toString().split(',').map(Number).filter(v => !isNaN(v));

        // หาค่า min/max เฉพาะเซลล์ที่มีค่าจริง (>0) กันเซลล์ว่าง (0.000) ถูกนับผิด
        let activeCells = cells.filter(v => v > 0);
        let minVal = activeCells.length ? Math.min(...activeCells) : null;
        let maxVal = activeCells.length ? Math.max(...activeCells) : null;

        cells.forEach((val, index) => {
          let cellNum = index + 1;
          let elementTxt = document.getElementById(`c${cellNum}-txt`);
          let elementBar = document.getElementById(`c${cellNum}-bar`);
          if (elementTxt && elementBar && !isNaN(val)) {
            elementTxt.innerText = val.toFixed(3) + " V";
            let cellPct = ((val - 2.50) / (3.65 - 2.50)) * 100;
            elementBar.style.width = Math.min(100, Math.max(0, cellPct)) + '%';

            // เคลียร์คลาสสีเดิมก่อน แล้วเซ็ตใหม่ตามเงื่อนไข
            elementTxt.classList.remove('green-txt', 'red-txt', 'blue-txt');
            if (val > 0 && val === minVal) {
              elementTxt.classList.add('red-txt');
            } else if (val > 0 && val === maxVal) {
              elementTxt.classList.add('blue-txt');
            } else {
              elementTxt.classList.add('green-txt');
            }
          }
        });
      }

      if (data.history) {
        updateHistoryChart(data.history, data.metric || activeMetric);
      }
    }).getBatteryData(activeTimeRange, activeMetric);
  }

  function updateHistoryChart(history, metric) {
    let validHistory = history; // ค่าติดลบได้ (เช่น current) จึงไม่กรอง > 0 อีกต่อไป
    if (validHistory.length === 0) return;

    let chartData = validHistory.map(d => [d.timestamp, Number(d.value) || 0]);
    let label = METRIC_LABELS[metric] || metric;

    let options = {
      series: [{ name: label, data: chartData }],
      chart: { type: 'line', height: 200, theme: 'dark', background: 'transparent', toolbar: { show: false }, animations: { enabled: false } },
      colors: ['#00ff66'],
      stroke: { curve: 'smooth', width: 2 },
      dataLabels: { enabled: false },
      xaxis: {
        type: 'datetime',
        labels: { show: false },
        axisBorder: { show: true, color: '#1f293d' },
        axisTicks: { show: false },
        tooltip: { enabled: false }
      },
      tooltip: {
        theme: 'dark',
        x: { format: 'dd MMM yyyy HH:mm' }
      },
      yaxis: {
        labels: { style: { colors: '#00ff66' }, formatter: (val) => val.toFixed(2) }
      },
      grid: { borderColor: '#1f293d', strokeDashArray: 4 }
    };

    if (!historyChart) {
      historyChart = new ApexCharts(document.querySelector("#chart"), options);
      historyChart.render();
    } else {
      historyChart.updateSeries([{ name: label, data: chartData }]);
      historyChart.updateOptions(options);
    }
  }

  // ---------- Init ----------
  window.onload = function () {
    google.script.run.withSuccessHandler(function (settings) {
      currentSettings = settings;
      applySettingsToUI();
      fetchDashboardData();
      setInterval(fetchDashboardData, 5000);
    }).getSettings();
  };
</script>
